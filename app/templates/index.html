<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stickora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

    <div id="start-page">
        <h1>stickora.</h1>
        <p>ready to decorate ?</p>
        <button id="start-btn">start</button>
        <p2>ver 0.1.0-alpha</p2>
    </div>

    <div id="main-page" class="hidden">

        <div class="page-wrapper">
            <main class="main-content">
                <div id="canvas" class="bg-blank"></div>
            </main>

            <aside class="sidebar">
                <div id="options-panel">
                    <button class="btn" id="change-bg-btn">Change Canvas</button>
                    <button class="btn" id="clear-btn">Clear All</button>
                    <button class="btn" id="exit-btn">Exit</button>
                </div>
                <div id="sticker-panel">
                    <img src="{{ url_for('static', filename='img/sticker1/rose.png') }}" class="sticker" draggable="true">
                    <img src="{{ url_for('static', filename='img/sticker1/heart.png') }}" class="sticker" draggable="true">
                    <img src="{{ url_for('static', filename='img/sticker1/greenleaf.png') }}" class="sticker" draggable="true">
                    <img src="{{ url_for('static', filename='img/sticker1/mapleleaf.png') }}" class="sticker" draggable="true">
                </div>
            </aside>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
