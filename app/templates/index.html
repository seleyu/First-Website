<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stickora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

    <div class="page-wrapper">

        <main class="main-content">
            <div id="canvas" class="bg-blank"></div>
        </main>

        <aside class="sidebar">
            <div id="options-panel">
                <button class="btn">Change Canvas</button>
            </div>
            <div id="sticker-panel">
                <img src="{{ url_for('static', filename='img/sticker1/rose.png') }}" class="sticker" draggable="true">
                <img src="{{ url_for('static', filename='img/sticker1/heart.png') }}" class="sticker" draggable="true">
                <img src="{{ url_for('static', filename='img/sticker1/greenleaf.png') }}" class="sticker" draggable="true">
                <img src="{{ url_for('static', filename='img/sticker1/mapleleaf.png') }}" class="sticker" draggable="true">
            </div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
